spring.application.name=eventhive-backend
spring.profiles.active=local

# MySQL Connection
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/eventhive_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true

# Server port
server.port=8080

# JWT (secret comes from application-local.properties locally,
# or DB_PASSWORD / JWT_SECRET env vars in production)
jwt.secret=${JWT_SECRET:DevOnlySecretChangeInProduction2026MustBeAtLeast32CharactersLong}
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000


razorpay.key.id=${RAZORPAY_KEY_ID:}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}

gemini.api.key=${GEMINI_API_KEY:}