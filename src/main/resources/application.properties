spring.application.name=eventhive-backend
spring.profiles.active=local

# MySQL Connection
spring.datasource.url=jdbc:mysql://localhost:3306/eventhive_db
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:CHANGE_ME}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server port
server.port=8080

# JWT (secret comes from application-local.properties locally,
# or DB_PASSWORD / JWT_SECRET env vars in production)
jwt.secret=${JWT_SECRET:DevOnlySecretChangeInProduction2026MustBeAtLeast32CharactersLong}
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000